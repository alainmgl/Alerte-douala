<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="Segoe UI, Arial, sans-serif">
  <rect x="0" y="0" width="1200" height="800" fill="#f8fafc"/>

  <!-- Titre -->
  <text x="600" y="40" text-anchor="middle" font-size="26" font-weight="700" fill="#0f172a">Cablage du prototype — ESP32 + 3 capteurs (Alerte Douala)</text>
  <text x="600" y="66" text-anchor="middle" font-size="15" fill="#475569">HC-SR04 alimente en 5V — capteurs analogiques en 3V3 — lecture sur ADC1 uniquement (GPIO 34 / 35)</text>

  <!-- ======================= WIRES (dessous) ======================= -->
  <!-- RED : 5V -> HC-SR04 VCC -->
  <polyline points="700,255 810,255 810,150 840,150" fill="none" stroke="#dc2626" stroke-width="3"/>
  <!-- YELLOW : TRIG (GPIO5) -> HC Trig -->
  <polyline points="700,310 820,310 820,180 840,180" fill="none" stroke="#f59e0b" stroke-width="3"/>
  <!-- GREEN : HC Echo -> R1 top -->
  <polyline points="840,210 770,210 770,320" fill="none" stroke="#16a34a" stroke-width="3"/>
  <!-- GREEN : tap -> GPIO18 -->
  <polyline points="770,370 700,370" fill="none" stroke="#16a34a" stroke-width="3"/>
  <!-- GREEN : R1 bottom -> R2 top (passe par le tap) -->
  <polyline points="770,360 770,385" fill="none" stroke="#16a34a" stroke-width="3"/>
  <!-- BLACK : GND bus (GPIO GND_R -> R2 bottom -> HC GND) -->
  <polyline points="700,440 905,440 905,240 840,240" fill="none" stroke="#111827" stroke-width="3"/>
  <polyline points="770,425 770,440" fill="none" stroke="#111827" stroke-width="3"/>

  <!-- RED gauche : 3V3 -> Soil VCC + Rain VCC -->
  <polyline points="500,290 420,290 420,280 320,280" fill="none" stroke="#dc2626" stroke-width="3"/>
  <polyline points="420,290 420,450 320,450" fill="none" stroke="#dc2626" stroke-width="3"/>
  <!-- BLACK gauche : GND -> Soil GND + Rain GND -->
  <polyline points="500,470 400,470 400,310 320,310" fill="none" stroke="#111827" stroke-width="3"/>
  <polyline points="400,480 320,480" fill="none" stroke="#111827" stroke-width="3"/>
  <polyline points="400,470 400,480" fill="none" stroke="#111827" stroke-width="3"/>
  <!-- BLUE : Rain AO -> GPIO34 -->
  <polyline points="500,350 350,350 350,510 320,510" fill="none" stroke="#2563eb" stroke-width="3"/>
  <!-- PURPLE : Soil AOUT -> GPIO35 -->
  <polyline points="500,410 370,410 370,340 320,340" fill="none" stroke="#9333ea" stroke-width="3"/>

  <!-- ======================= COMPONENTS ======================= -->
  <!-- ESP32 -->
  <rect x="500" y="220" width="200" height="300" rx="10" fill="#1f2937" stroke="#0f172a" stroke-width="2"/>
  <text x="600" y="248" text-anchor="middle" font-size="17" font-weight="700" fill="#f9fafb">ESP32 DevKit</text>
  <!-- ESP32 pin labels (droite) -->
  <text x="692" y="259" text-anchor="end" font-size="13" fill="#e5e7eb">5V</text>
  <text x="692" y="314" text-anchor="end" font-size="13" fill="#e5e7eb">GPIO5</text>
  <text x="692" y="374" text-anchor="end" font-size="13" fill="#e5e7eb">GPIO18</text>
  <text x="692" y="444" text-anchor="end" font-size="13" fill="#e5e7eb">GND</text>
  <!-- ESP32 pin labels (gauche) -->
  <text x="508" y="294" text-anchor="start" font-size="13" fill="#e5e7eb">3V3</text>
  <text x="508" y="354" text-anchor="start" font-size="13" fill="#e5e7eb">GPIO34</text>
  <text x="508" y="414" text-anchor="start" font-size="13" fill="#e5e7eb">GPIO35</text>
  <text x="508" y="474" text-anchor="start" font-size="13" fill="#e5e7eb">GND</text>

  <!-- HC-SR04 -->
  <rect x="840" y="120" width="200" height="150" rx="8" fill="#e0f2fe" stroke="#0369a1" stroke-width="2"/>
  <text x="940" y="142" text-anchor="middle" font-size="15" font-weight="700" fill="#075985">HC-SR04</text>
  <text x="940" y="160" text-anchor="middle" font-size="12" fill="#0369a1">niveau d'eau (ultrason)</text>
  <text x="852" y="154" text-anchor="start" font-size="12" fill="#0c4a6e">VCC (5V)</text>
  <text x="852" y="184" text-anchor="start" font-size="12" fill="#0c4a6e">TRIG</text>
  <text x="852" y="214" text-anchor="start" font-size="12" fill="#0c4a6e">ECHO</text>
  <text x="852" y="244" text-anchor="start" font-size="12" fill="#0c4a6e">GND</text>

  <!-- Soil moisture -->
  <rect x="120" y="255" width="200" height="110" rx="8" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
  <text x="210" y="278" text-anchor="middle" font-size="14" font-weight="700" fill="#166534">Humidite du sol</text>
  <text x="210" y="296" text-anchor="middle" font-size="11" fill="#15803d">(capacitif)</text>
  <text x="308" y="284" text-anchor="end" font-size="12" fill="#14532d">VCC (3V3)</text>
  <text x="308" y="314" text-anchor="end" font-size="12" fill="#14532d">GND</text>
  <text x="308" y="344" text-anchor="end" font-size="12" fill="#14532d">AOUT</text>

  <!-- Rain sensor -->
  <rect x="120" y="425" width="200" height="110" rx="8" fill="#fef9c3" stroke="#a16207" stroke-width="2"/>
  <text x="210" y="448" text-anchor="middle" font-size="14" font-weight="700" fill="#854d0e">Capteur de pluie</text>
  <text x="210" y="466" text-anchor="middle" font-size="11" fill="#a16207">(YL-83 / FC-37)</text>
  <text x="308" y="454" text-anchor="end" font-size="12" fill="#713f12">VCC (3V3)</text>
  <text x="308" y="484" text-anchor="end" font-size="12" fill="#713f12">GND</text>
  <text x="308" y="514" text-anchor="end" font-size="12" fill="#713f12">AO</text>

  <!-- ======================= RESISTORS (pont diviseur) ======================= -->
  <rect x="758" y="320" width="24" height="40" fill="#ffffff" stroke="#111827" stroke-width="2"/>
  <rect x="758" y="385" width="24" height="40" fill="#ffffff" stroke="#111827" stroke-width="2"/>
  <text x="792" y="345" text-anchor="start" font-size="13" font-weight="600" fill="#111827">R1 = 1 kΩ</text>
  <text x="792" y="410" text-anchor="start" font-size="13" font-weight="600" fill="#111827">R2 = 2 kΩ</text>
  <text x="770" y="306" text-anchor="middle" font-size="11" fill="#16a34a">pont diviseur 5V-&gt;3,3V</text>

  <!-- ======================= PIN DOTS ======================= -->
  <g fill="#fbbf24" stroke="#92400e" stroke-width="1.5">
    <circle cx="700" cy="255" r="5"/><circle cx="700" cy="310" r="5"/><circle cx="700" cy="370" r="5"/><circle cx="700" cy="440" r="5"/>
    <circle cx="500" cy="290" r="5"/><circle cx="500" cy="350" r="5"/><circle cx="500" cy="410" r="5"/><circle cx="500" cy="470" r="5"/>
  </g>
  <g fill="#38bdf8" stroke="#075985" stroke-width="1.5">
    <circle cx="840" cy="150" r="5"/><circle cx="840" cy="180" r="5"/><circle cx="840" cy="210" r="5"/><circle cx="840" cy="240" r="5"/>
  </g>
  <g fill="#4ade80" stroke="#166534" stroke-width="1.5">
    <circle cx="320" cy="280" r="5"/><circle cx="320" cy="310" r="5"/><circle cx="320" cy="340" r="5"/>
  </g>
  <g fill="#facc15" stroke="#854d0e" stroke-width="1.5">
    <circle cx="320" cy="450" r="5"/><circle cx="320" cy="480" r="5"/><circle cx="320" cy="510" r="5"/>
  </g>
  <!-- tap node du pont diviseur -->
  <circle cx="770" cy="370" r="4" fill="#16a34a" stroke="#166534" stroke-width="1.5"/>

  <!-- ======================= LEGENDE ======================= -->
  <rect x="120" y="585" width="520" height="195" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="140" y="610" font-size="16" font-weight="700" fill="#0f172a">Legende</text>
  <line x1="140" y1="632" x2="180" y2="632" stroke="#dc2626" stroke-width="4"/>
  <text x="190" y="637" font-size="13" fill="#1e293b">Alimentation : 5V (HC-SR04) / 3V3 (capteurs analogiques)</text>
  <line x1="140" y1="658" x2="180" y2="658" stroke="#111827" stroke-width="4"/>
  <text x="190" y="663" font-size="13" fill="#1e293b">Masse commune (GND)</text>
  <line x1="140" y1="684" x2="180" y2="684" stroke="#f59e0b" stroke-width="4"/>
  <text x="190" y="689" font-size="13" fill="#1e293b">TRIG -&gt; GPIO5</text>
  <line x1="140" y1="710" x2="180" y2="710" stroke="#16a34a" stroke-width="4"/>
  <text x="190" y="715" font-size="13" fill="#1e293b">ECHO -&gt; GPIO18 (via pont diviseur R1/R2)</text>
  <line x1="140" y1="736" x2="180" y2="736" stroke="#2563eb" stroke-width="4"/>
  <text x="190" y="741" font-size="13" fill="#1e293b">Pluie AO -&gt; GPIO34 (ADC1)</text>
  <line x1="140" y1="762" x2="180" y2="762" stroke="#9333ea" stroke-width="4"/>
  <text x="190" y="767" font-size="13" fill="#1e293b">Sol AOUT -&gt; GPIO35 (ADC1)</text>

  <!-- ======================= NOTES ======================= -->
  <rect x="660" y="585" width="520" height="195" rx="8" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/>
  <text x="680" y="610" font-size="16" font-weight="700" fill="#9a3412">A retenir</text>
  <text x="680" y="636" font-size="13" fill="#7c2d12">- ECHO sort en 5V : R1 (1kΩ) + R2 (2kΩ) le ramenent a ~3,3V.</text>
  <text x="680" y="660" font-size="13" fill="#7c2d12">- Capteurs analogiques sur GPIO 34 &amp; 35 (ADC1) obligatoire :</text>
  <text x="694" y="680" font-size="13" fill="#7c2d12">l'ADC2 est inutilisable quand le WiFi est actif.</text>
  <text x="680" y="704" font-size="13" fill="#7c2d12">- HC-SR04 : VCC en 5V (VIN). Pluie &amp; sol : VCC en 3V3.</text>
  <text x="680" y="728" font-size="13" fill="#7c2d12">- Masse (GND) commune a tous les modules.</text>
  <text x="680" y="752" font-size="13" fill="#7c2d12">- Envoi : POST /api/sensors/&lt;deviceId&gt;/readings</text>
  <text x="694" y="772" font-size="13" fill="#7c2d12">header x-api-key + JSON { readings: { ... } }</text>
</svg>
